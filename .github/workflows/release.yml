name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to create or update, for example v0.1.0"
        required: true
        type: string

permissions:
  contents: write

jobs:
  macos-universal:
    name: Build macOS universal binary
    runs-on: macos-14

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust targets
        run: |
          rustup target add aarch64-apple-darwin x86_64-apple-darwin

      - name: Verify shell scripts
        run: |
          bash -n plugins/redpen-codex/shared/coach_codex.sh
          bash -n plugins/redpen-codex/hooks/grammar_check.sh
          bash -n plugins/redpen/hooks/grammar_check.sh
          sh -n scripts/install-codex-app.sh

      - name: Verify renderer JavaScript
        run: |
          node -e 'const fs = require("fs"); new Function(fs.readFileSync("assets/codex-app/renderer-inject.js", "utf8"));'

      - name: Run Rust tests
        run: cargo test --workspace --locked

      - name: Build arm64 binary
        run: cargo build --release --locked -p redpen-codex-app --target aarch64-apple-darwin

      - name: Build x86_64 binary
        run: cargo build --release --locked -p redpen-codex-app --target x86_64-apple-darwin

      - name: Package release assets
        run: |
          set -eu
          mkdir -p dist
          lipo -create \
            target/aarch64-apple-darwin/release/redpen-codex-app \
            target/x86_64-apple-darwin/release/redpen-codex-app \
            -output dist/redpen-codex-app-macos-universal
          chmod +x dist/redpen-codex-app-macos-universal
          cp scripts/install-codex-app.sh dist/install-codex-app.sh
          (
            cd dist
            shasum -a 256 redpen-codex-app-macos-universal > redpen-codex-app-macos-universal.sha256
            shasum -a 256 install-codex-app.sh > install-codex-app.sh.sha256
          )

      - name: Install dmgbuild
        run: |
          set -eu
          python3 -m venv "$RUNNER_TEMP/dmgvenv"
          "$RUNNER_TEMP/dmgvenv/bin/pip" install --quiet dmgbuild
          echo "$RUNNER_TEMP/dmgvenv/bin" >> "$GITHUB_PATH"

      - name: Build Red Pen installer (.dmg)
        run: |
          set -eu
          # Uses the committed app icon (no Codex.app needed) and embeds the
          # universal binary built above. dmgbuild styles the image headlessly.
          BIN="$PWD/dist/redpen-codex-app-macos-universal" bash packaging/codex-app/build.sh
          bash packaging/codex-app/make-dmg.sh
          cp "packaging/codex-app/build/Red Pen.dmg" "dist/Red Pen.dmg"
          (
            cd dist
            shasum -a 256 "Red Pen.dmg" > "Red Pen.dmg.sha256"
          )

      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
        run: |
          set -eu
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" dist/* --clobber
          else
            gh release create "$RELEASE_TAG" dist/* \
              --target "$GITHUB_SHA" \
              --title "$RELEASE_TAG" \
              --generate-notes
          fi
